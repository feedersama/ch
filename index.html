<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Results summary component</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous">
  </script>
  <script src="https://kit.fontawesome.com/211d6fd7c3.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="assets\css\stylesheet.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@800&display=swap" rel="stylesheet">
 


</head>

<body>
  <!-- Result -->
  <div class="row">
    <div class=" col-lg-6 result">
      <h1>Your Result</h1>
      <div>
        <p class="p1"><span class="sp"> 76</span><br>
          of 100</p>

        <h2>Great</h2>
        <p class="p2">you scored higher than 65% of the people who have taken these tests.</p>
      </div>
    </div>

    <!-- summary -->
    <div class=" col-lg-6 summary">
      <h1> Summary</h1>
      <div class="mainlist">
        <div class="sup">
          <div class="sup1"><i class="fa-solid fa-bolt"></i>  Reaction</div>
          <div class="sup11">80 / <span class="hun">100</span></div>
        </div>
        <div class="sup">
          <div class="sup2"><i class="fa-solid fa-brain"></i> Memory</div>
          <div class="sup11">92 / <span class="hun">100</span></div>
        </div>
        <div class="sup">
          <div class="sup3"> <i class="fa-brands fa-facebook-messenger"></i>Verbal</div>
          <div class="sup11">61 / <span class="hun">100</span></div>
        </div>
        <div class="sup">
          <div class="sup4"> <i class="fa-solid fa-eye"></i> Visual</div>
          <div class="sup11">72 / <span class="hun">100</span></div>
        </div>
      </div>
      <button type="button" class="btn">Continue</button>

    </div>
  </div>
</body>

</html>
